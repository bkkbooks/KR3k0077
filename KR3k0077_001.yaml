body:
  text: 續事始五卷續事始五卷皇帝史記本紀自五帝之後夏殷子孫皆曰王周武王伐紂後貶帝號周朝皆王及秦初悉稱公始皇稱皇帝太上皇秦本紀始皇即位追尊莊襄王為太上皇後漢高祖尊父為太上皇倣此也天子稱朕自秦皇始也蔡邕註云朕我也古者上下通稱之皋陶曰朕言屈原曰朕皇考至秦制天子獨稱朕後因之不改帝皇五運史記曰太吳伏義氏木德王始有五運之次炙轂子曰帝王五運之次凡有二說鄒衍則以五行相勝為義劉向以五行相生至顓頊五帝相承漢魏以還共遵劉說也呼君上曰陛下史記秦丞相李斯等議事曰今陛下興義兵誅殘賊霍光廢昌邑王丞相張敞等奏稱臣等昧死言皇太后陛下至後漢上皇太后疏亦為常制尊號自堯舜禹湯以來曆代為一加諡號及追諡至秦丞相王綰李斯等議曰臣等昧死上尊號王為泰皇乃除諡法其後唐累朝宰臣文武百官上尊號以為常制避正殿損常膳後漢明帝時僕射鍾離意以帝起北宮諫曰陛下以天旱每自剋責避正殿損常膳而天猶不雨據此起自漢明帝也其後帝王每有災眚以為規式封禪史記管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏在伏義之前封泰山禪梁父李奇云無懷氏為封禪之始也皇后后亦君也周制天子立后曰皇后秦稱皇帝正嫡曰皇后母曰皇太后漢因之祖母稱太皇太后自唐初皇太后並加四字尊號妃史記皇帝皆立四妃禹湯皆曰妃又古者正嫡曰元妃魏明帝六宮增淑妃宋書武帝置貴妃隋煬帝置德妃賢妃秦以天子正嫡稱妃後魏親王之妻皆為妃王母為太妃唐長公主母曰太儀餘六宮嬪嬙十四等二十四司品位代有沿革具載於坤儀令皇太子春秋晉鄭齊楚諸侯之子皆稱太子周初文王為世子又曰太子發太子丹漢制皇帝之嫡嗣立為皇太子諸侯王之嗣立為世子殿下魏志太祖定漢中東還欲討將軍許攸留府長史杜襲諫太祖呼為殿下時太祖封魏王位在諸侯王上置相國故襲呼殿下按此始也賈充亦呼司馬文王為殿下唐初儀制令百官上疏於太皇太后皇后稱殿下百官及東宮官對皇太子皆曰殿下諸侯古者天子稱王漢初立二等爵大者王小者侯故以王號加於諸侯王蔡邕獨斷云漢制皇子及功臣封為王自漢祖始也皇太孫晉永康元年立愍懷太子第二子臨淮王為皇太孫齊永明十一年立文惠太子長子南郡王昭業為皇太孫唐高宗欲立皇孫重照為太孫郡王魏封功臣改郡主為郡王郡公漢武帝十三年初議者以土無二王臣爵不得過公以太原王章為齊公功臣悉封公十七年依舊封王國公隋書文帝封功臣為國公公主自古天子之女未有封邑至周中葉天子嫁女於諸侯天子至尊不自主婚使同姓諸侯主之始謂之公主漢制天子女為公主姊妹曰長公主帝姑為大長公主後漢諸王女封縣主公主行婦禮自唐王珪之子敬直尚太宗女南平公主始百官郯子曰太皞氏龍紀故為龍師而龍名此乃命官之始也至虞舜建官惟百故曆代置百官焉宰相管子曰黃帝得六相而天地理厥後天子及列國侯皆或一人或二人三人四人漢初惟丞相一人唐高宗以李勣為尚書左僕射故事以右僕射一人侍中中書令各一人為正宰相至勣受僕射始帶同中書門下三品則天下以兩省長官乃同中書門下三品並平章事為宰相也左右丞相殷湯居毫初置二相伊尹為左相仲虺為右相自古至前漢左高於右唐玄宗以左右丞相平章事高宗永淳元年上至東都郭待舉等宜與中書門下同承受進上平章事初上欲用待舉等歷任尚淺且欲令預聞政事自是外司四品以下官知政事自以平章事為目自待舉始也宰相遙領節度使唐曆云自牛仙客始按會要云蕭嵩遙領唐曆誤也集賢殿學士玄宗實錄開元十三年置弘文館學士會要武德九年置神龍初為修文館避孝敬諱開元七年仍舊崇文館學士東宮官魏文帝選善屬文者充之唐高宗朝鄭組等為之崇賢館學士唐貞觀中置屬左春坊并直學士教授諸王後沛王賢為皇太子避其名復為崇文館崇文館學士會要開元二十九年於玄元皇帝廟置崇文館各一員命生徒習道經莊子文子列子準明經例考試翰林學士貞觀中太宗初開文學館高宗朝國政歸於武后后亦廣召文辭之士始曰北門學士玄宗改為翰林待詔又改為供奉開元二十六年乃為學士始立學士院於翰林院之南始有翰林學士之名肅宗在靈武始掌旨詔及草麻制元和中以院長一人別敕承旨學士承旨自此始知制誥開元元年蘇頲王琚為知制誥自後凡以他官為翰林學士中書舍人皆加知制誥六尚書有虞之官周禮六卿之職吏部天官冢宰戶部地官大司徒禮部春官舜典曰秩宗兵部夏官大司馬刑部秋官舜典曰士周官大司寇工部冬官周禮大司空也通典曰秦時所置秦遣吏四人在殿中主發書故謂之尚書李固云陛下有尚書猶天之有北斗總謂之尚書臺亦曰中臺尚書左右丞具員故事漢武帝建始四年置丞四員至後漢光武減其二惟置左右丞龍朔二年改為左右肅機復舊六司侍郎前漢已有侍郎之號未分曹署隋煬帝以尚書六曹各置侍郎一人或以二人給事中漢書公卿表云秦官也按職員令掌侍從駁正違失顧問應對以有事於殿內故曰給事中龍朔中改為東臺舍人咸亨初復舊中書舍人漢書制尚書郎主奏事起草又魏志黃初中置通事郎掌詔令晉初置舍人謂之中通事舍人周禮地官有舍人舍人古官也陳及北齊除通事字直曰中書舍人別置通事舍人武德初因隋制號內史舍人三年改為中書舍人龍朔中改為西臺舍人光宅中改為鳳閣舍人開元初為紫微舍人五年復為中書舍人尚書郎秦置郎中領諸郡漢置尚書郎稱郎中歷代名號不常唐朝方定之左右司郎中隋官武德初省貞觀二年復為左右司諸司員外郎隋文帝置檢校省郎德宗寶應元年陳少遊為之始九寺卿周禮天子三公九卿三孤加六卿為九卿秦漢以九卿所掌與古不同亦無卿字至梁太常光祿以下方加卿字漢魏九寺皆曰府至漢太和十五年詔九寺各置少卿二人即後魏以前已改為寺也太常卿尚書舜命伯夷為秩宗周曰宗伯掌祭祀之儀秦曰奉常漢更名曰太常至梁始加卿字光祿卿續漢書云秦官也秦置郎中令漢武更名光祿勳梁加卿而除勳字唐改為司宰司膳神龍初復為光祿寺衛尉卿齊職儀曰秦官也梁為衛尉卿唐龍朔改為司衛後如故宗正卿周官小宗伯之職成王以伯為宗正掌三族之屬漢魏皆以皇族為宗正晉兼以庶姓宋齊不置梁為宗正卿唐以皇族為卿龍朔中改為司宗天寶復為宗正卿大理卿舜以皋陶作士乃理獄之官也周禮為士師秦以李斯為廷尉景帝更名為大理梁改秋卿唐改司刑寺復為大理卿太僕卿周穆王命伯冏為太僕正漢祖以夏侯嬰為太僕掌車馬唐改司馭司僕神龍年復為太僕寺鴻臚寺秦官有典客漢曰典屬國漢武改為大鴻臚唐改司文亦曰司賓寺神龍年復為鴻臚寺司農卿少皞氏以九扈為九農正秦為理粟內史漢景帝改為大農令武帝改為司農唐改司稼寺咸亨中復為司農寺太府卿周官太府下大夫掌九貢府藏諸市平準歷代不置其職任司農少府梁天監七年置少府卿後魏太和中改為太府卿唐龍朔二年改為外府寺光宅中改司府卿寺龍朔復為太府寺九寺少卿後魏太和中各置少卿二人九府監少府秦官掌山海池澤之稅漢書少府屬官有尚方令隋大業中分太府所管別局少府唐光宅中改為尚方監神龍中改少府監祕書殿中少監並隋煬帝所置通事舍人百官志魏始置通事舍人一人初與中書舍人同職晉初置通事舍人二職掌呈奏宣傳勞問之事侍讀宋武帝以徐受為晉安王子勛侍讀南齊賀分為衡陽王侍讀唐玄宗謂大臣曰宜選儒學博碩者一人每日入侍讀又開元六年以郤常等為太子剡王已下侍讀太子左右庶子宋書云庶子古官古者天子諸侯世子必有庶子之官漢中庶子掌侍左右獻替贊相禮儀駁正啟奏總判坊局齊職庶子同中書門下故謂之宮相又庶子掌教世子也太子率更令秦官知宗族禮樂刻漏之事太子左右諭德唐龍朔三年置職比太子左右贊善贊善大夫會要龍朔二年改中允為贊善大夫咸亨中復為中允至鳳儀四年別置左右贊善大夫十員職比諫議大夫太子中允貞觀初改太子中舍為中允職與中書舍人同太子舍人晉武帝置唐改中允舍人太子儀郎唐貞觀十八年置司儀郎四人太子文學魏武帝置晉不置後周置十人唐顯慶中復置太子家令漢曰詹事府置家令寺掌太子飲膳倉儲庫藏之事侍御史雜端侍御史周官也老子為柱下史即其任也唐置六人取其長一人知雜謂之端公亦呼雜端內供奉天后垂拱年補闕拾遺各六員四人內供奉殿中侍御史魏置魏初遣蘭臺二御史居殿中同糾非法故曰殿中侍御史後因之為侍御史監察御史隋置六典云監察御史十人分糾百僚又云隋置檢校御史為監察御史監察御史裏行六典云貞觀中太宗以馬周從布衣拜監察御史裏行又唐曆云高宗龍朔元年忻州定襄縣王本立為監察御史裏行自此始未知孰是今兩存左右補闕詩云袞職有闕惟仲山甫補之唐太宗朝取此義以名其官也左右拾遣漢書云元帝初拜給事中劉向為侍郎以金敝拾遺於左右蓋取其職唐以名官並天后朝置掌供奉諷諫之事謂之小諫官著作郎自後漢有東觀著作之名未為官號魏帝始置著作郎著作佐郎魏置佐著作郎至宋遂遷佐字在下起居郎起居舍人周官有左右史穆王置歷代錄人君之言事為起居注送史館隋置起居舍人貞觀二年置起居郎左右史之類也符寶郎宋書云秦置符節令漢置符璽郎天后改符寶郎協律郎漢武帝以李延年為協律郎若宗廟有事於階上舉旌以節樂大理司直漢公卿表云武帝元狩五年置大理評事會要貞觀二年置祕書魏武帝置掌四庫圖書校書郎漢成帝置祕書省正字北齊置將軒轅本紀云黃帝舉風后以為相用力牧以為將使相肅宗朝以節度使郭元振等同中書門下平章事號為使相也留守左傳晉侯將伐鄭荀罃留守史記漢高祖留蕭何守關中乃有留守之任後漢世祖每征討常令李通居守後魏文帝南伐以太尉元丕留守京師乃有留守之號唐朝天子在西京則有東都留守在東都則有西京留守尚父史記云周文王得呂尚以為師謂之太師武王嗣位謂之尚父世家云師尚父註云劉向別錄曰師之尚之故曰師尚父亦男子之美號也或云姓呂名尚元帥左傳晉謀元帥以卻縠將中軍未有元帥之號至隋文以梁叡為行軍元帥武德元年秦王加西討元帥玄宗以哥舒翰為兵馬元帥都統唐乾元元年除李峘為都統大總管周武帝建德六年以王謙為益州都總管隋文帝命韋孝寬代尉遲迥為益州總管迥不受代自稱大總管武帝初盛彥師裴寂並為行軍大總管大都督漢光武初征伐四方始權置督軍御史魏武帝為漢相大軍出征有併督眾事者始有都督之號督中外諸軍事武帝七年改大總管為大都督府京兆河南等尹周官有內史秦因之掌理京師漢武帝太初元年改內史為京兆尹後都洛陽置河南尹雍州置牧以親王為之開元元年雍州為京兆府洛州為河南府九年并州為太原府蒲州置中都為河中府十五載岐州為鳳翔府益州為成都府凡前代帝王所都皆為尹其後京兆都府稱府尹河南鳳翔城都府并改長史為尹改司馬置少尹司馬本一人大足元年加一員為左右司馬遂置少尹三人通判府事諸州都督府後周置例兼州事與剌史同持節諸軍事後魏剌史任重者為使持節至隋剌史有兵處加諸軍事副元帥副招討節度安撫等副使古者命上卿將三軍皆有左右副也左傳晉作三軍謀元帥卻縠將中軍卻臻佐之狐偃將上軍狐毛佐之即元帥招討之副也魏志明帝詔司馬宣王討遼以母丘儉為副至唐置副留守招討及節度安撫圃練防禦等副使又列國卿大夫聘好必有介焉介亦副也傳曰楚公子圉聘於鄭伍舉為介是也其後天子遣使於外國大藩冊贈官告皆有使副及唐末內外諸司使皆置副使行軍長史魏志太祖以劉曄為行軍長史行軍司馬隋文帝以尚書左丞李綱為行軍司馬統軍會要武德七年改驃騎將軍為統軍車騎將軍為副軍德宗貞元二年置統軍二人十四年又置左右神策統軍一人諸衛上將軍史記楚王召宋義為上將軍唐貞觀時置上將軍一人在大將軍上大將軍漢書周官大司馬之職天子六軍有征伐則命卿將之即將之任也秦楚別無名號惟拜大將軍漢因之增立名位自三號至十二號光武中興諸將軍皆稱大字和帝以竇憲為大將軍左右行衛大將軍會要武德元年因隋舊制改為左右翊衛五年五月去翊字但為左右衛矣武衛大將軍魏許褚武衛中郎將隋因之置武衛大將軍龍武大將軍開元中分羽林軍各置龍武大將軍一人將軍二人神武大將軍貞元二年殿前射生軍為神武軍各置大將軍一人將軍二人龍威衛大將軍隋初置煬帝改為屯衛左右各置大將軍一人將軍二人貞觀中號為百騎又改千騎又改為羽林衛復為威衛監門衛大將軍隋開皇三年置并將軍二人千牛衛大將軍後魏置千牛備身十二人執御刀歷代因之唐改為左右千牛衛置大將軍各一人將軍二人龍朔年改為奉裕神龍元年復為千牛雲麾將軍通典云梁置為武職散官唐末以為起階具員駙馬都尉漢武帝置掌御馬初置奉車都尉駙馬都尉騎都尉魏以何晏尚太祖女金鄉公主拜駙馬都尉晉武帝以皇室外戚為三都尉惟駙馬都尉諸尚主者為之遂為常制也太子左右衛率府率具員故事太子左右衛左右禦清道鶴禁等皆為率府初置各一員秦官也晉安帝加至四率主門衛太子出則一率前導三率從左右衛判官會要大曆三年左右衛使各置判官一人版圖使周禮司民掌登萬民之數即後代戶部尚書侍郎之任唐以宰相充版圖使度支使魏文帝置度支尚書唐初置民部貞觀年改為度支省開元以後始有判使之號又置副使判官推官巡官也監鐵使史記管仲治齊始榷山海之利漢武帝始有鑄錢煮監之則乃以孔僅大司農領監鐵事桑弘羊奏置鹽鐵使會要乾元二年以度支郎中第五琦充諸道鹽鐵使租庸使開元十一年宇文融充勾當地稅使天寶二年改租庸使採訪使開元十七年張九齡奏置十道採訪使招討使開元十七年宰臣奏置節度使唐中宗景雲二年始以賀延嗣為梁州都督充河西節度使觀風使肅宗至德元年改採訪使為觀風處置使安撫使高宗朝命裴行儉冊送波斯王仍為安撫大使天后聖曆元年命狄仁傑為河北道安撫使德宗貞元元年除韋皋劍南西川節度大使帶安撫使軍容使唐肅宗上元元年命內侍監魚朝恩選六師之銳集于近囿以為神策軍又命朝恩以神策之旅往鎮陝服仍充神策軍容始有軍容之號尋加天下觀軍容使堅讓天下之號內樞密使西晉書太始中以王景文為中書令兼管內樞密唐代宗永泰中敕中官董秀管樞密因置內樞密使見君臣政要功德使參玄語錄云後魏立監福曹又改為昭玄司掌僧道二教百官舉要云隋有慶善監唐改為功德使內飛龍使周官太僕乘黃典廄尚乘並歷代掌閑廄之馬至則天朝置閑廄令李吉甫百司舉要云太僕則天分置閑廄飛龍司農則別有園苑莊宅玄宗朝以後置閑廄使更置飛龍使五坊宮苑使會要開元十九年金吾將軍楊崇慶充五坊宮苑使五坊鵰鶻鷹鷂狗也初五坊與宮苑同一使唐末始分為兩使監軍使齊景公使穰苴願得公之寵臣以監軍乃命莊賈監之漢武帝置監軍使者唐神龍元年以後諸道節度並以中官為監軍使轉運使史記楚漢相持於滎陽軍無見糧蕭何轉運關中蜀漢之粟方舡而下又曰漢時漕運山東粟以給中都即轉運之任未有使號開元二十二年自太原倉北運浮於渭以實關中以裴耀卿充轉運使營田使漢尚書郎四人一人主戶口墾田蓋屯田之任也公田曰屯田晉始有屯田郎凡轉運不給則設屯田以益軍儲玄宗朝因之始置營田使也圃練使肅宗武德中改采訪使為觀風使并領都圃練其後上郡刺史有圃練使之號防禦使天寶十四年安祿山反中外大震玄宗始置防禦使搜訪圖書使梁阮孝緒七錄云漢成帝之世書籍頗有亡逸乃使謁者陳農訪遺書於天下隋祕書監牛弘亦奏遣使搜訪異書後唐明宗天成元年命戶部郎中庚傳美充三川搜訪圖書使玄宗朝置諸侯修奉太廟使太清宮使禮儀使園苑使閑廄使莊宅使內諸軍使左右街使典陟使巡撫使宣慰外國冊立使弔祭使選補使會盟使監牧使左右巡使供軍糧料榷鹽使給納使和糴使太倉使內八作使栽接使經略使覆囚使尚書省帝堯納舜於大麓錄天下事似其任也周官司會又其職焉漢初尚書雖有曹名不以為號又靈帝以侍中梁鵠為選部尚書謂之中臺前漢未有錄名章帝以趙傳趙嘉太尉牟融並錄尚書事僕射總理六尚書謂之都省亦曰南省唐光宅初改為文昌臺垂拱年改為都省神龍元年為六書省都堂舊尚書令有大廳堂省之中謂之都堂堂左右分二十四司門下省秦曰黃門蓋古侍中之任漢置黃門郎晉始置門下省改侍郎門下省為北省亦曰左省龍朔二年改為東堂光宅元年改為鸞臺神龍中復為門下省中書省漢書孝武帝置初以宦者典掌尚書奏之事改尚書為中書謁者置令僕射孝武以太史公司馬遷為中書令魏置中書侍郎中書省為右省亦曰西掖龍朔年改為鳳閣省開元初改為紫微省五年復為中書省政事堂舊制宰相常於門下省議事謂之政事堂故長孫無忌魏徵皆知門下事至永淳二年中書令裴炎奏政事堂合在中書遂移在中書省中書門下印開元十一年張說改政事印為中書門下之印中書除官舊制內外皆吏部啟奏授之自隋以降五品之上官中書門下訪擇聞奏然後下制授肅宗即位復令中書以功除官祕書省漢書藝文志武帝建藏書府置寫書官故曰祕書桓帝置監魏置丞後魏曰蕓臺唐初曰祕書省龍朔二年改為蘭臺天授改曰麟臺咸亨元年復為祕書省內侍御天文有宦者四星在天市垣帝座之側周官有宮正宮伯有內宰即宮令是也戰國時有宦者令有將作衛尉並皇后卿也漢景帝改將作為大長秋令初秦置中常侍參用士人自漢和熹之世乃用中官晉用詹事府管掌宮事省中內侍內常事給事中內謁者監內侍省掖廷令宮闈令奚官內僕內府府寺等局各有令丞及高品內養或為長信府或為長秋監隋改為內侍省天寶十三載置內侍監殿中省漢書少府官有令有丞隋開皇初隸門下省大業三年分置殿內省置監丞以下掌尚食尚藥尚衣尚舍尚乘尚輦等六局唐武德初因隋舊制至三年改為殿中省龍朔年改為御府咸亨復舊御史臺御史者周柱下史之職秦置御史大夫及中丞為執法之官漢書曰尚書為中臺御史為憲臺謁者為外臺是謂三臺朝廷分御史為左肅政臺以司隸校尉為右肅政臺近代不置司隸校尉仍舊為御史臺以中丞為憲長三院御史俱曰臺官故事臺北開者以法司主陰取冬殺之義或曰隋初為都之時兵部尚書李圓通兼御史大夫欲使向省便近故開北門司天臺按史曰昔在顓頊命南正重司天北正黎司地唐虞之際分命義和紹重黎之後者使復典之周昭王在時有太史漢為太史局以司馬談為太史令撰述國史至唐乾元元年置司天臺臺內別置一院名曰通玄院應有天文道術人皆于此安置其太史令既改為司天監惟掌天文而已史館史館肇自黃帝命倉頡掌之周之列國各有史官至漢武始置太史令魏明帝太和中史職隸中書貞觀三年置史館開元中以宰相李林甫監修國史四方館沈約宋書高祖永初中置南北客館令各一人因改為四方館舊儀于通事舍人中以宿長一人總知館事謂之館主國子監周官師氏之職以三德教國子即其任也漢魏以祭酒一人掌監之學晉袁環為國子祭酒上疏求立學徒帝從之則國學之興自環始也宋廢國學置總明觀隋開皇初罷國學立太學煬帝改為國子監唐初改成均館光宅中改為成均監開元初復為國子監石經漢靈帝立獻納院唐實錄天后垂拱二年置匭四枚共為一室以銅鑄之四面各依方色東曰延恩南曰招諫西曰伸冤北曰通玄諫議大夫及御史中丞充匭使天寶九載改為獻納使謂之獻納院會要云大曆建中復為理匭使待漏院元和中置于朝門進奏院大曆十二年敕諸道舊置上都留候院宜並改為上都進奏院令諸道稱進奏官城軒轅本紀曰黃帝築城邑也造五城十二樓舊事始云鯀作宮室黃帝作室昆侖山上穆天子登昆侖山以觀黃帝之宮室開府儀同三司東觀漢記章帝建初三年以馬防為車騎將軍使班同三司煬帝延平元年鄧騭為車騎將軍使儀同三司魏黃權以車騎將軍開府儀同三司唐以為從一品為之散官特進正二品漢置皇后父率為此官諸侯功德優盛朝廷所敬異者賜位特進在三公下後建武中鄧禹罷三官列侯就第位特進隋以為散官以為階又唐末以開封儀同三司驃騎將軍特進並中宮之官呼焉光祿大夫從二品漢公卿表云大夫皆秦官也秦置郎中令漢武更名光祿勳又中大夫為光祿大夫至唐惟置光祿大夫為散官金紫光祿大夫正三品蕭子顯齊書云加金章紫綬為金紫光祿大夫銀青光祿大夫從三品後魏以前未有銀青之目舊制光祿大夫銀章青綬後加金紫為金紫光祿大夫故名銀青以對金紫合在光祿大夫之上五等爵黃帝立公侯伯子男五等爵也內外諸司使判官古者列國諸侯之上卿皆相國也與大夫以下于天子皆稱陪臣至漢封諸王亦各有相三公及將軍幙府或有掾屬或曰長史或曰主簿或有從事郎中郡則以丞及功曹佐之漢魏齊梁未有判官之職至隋元藏機始為過海使判官睿宗朝節度使置判官厥後三司諸道節度觀風等使及剌史各置判官唐末凡諸司使往往有判官節度掌書記漢百官置諸王三公及大將軍幙府皆有記室掌章表書記文檄魏志太祖以陳琳阮瑀為記室掾文帝為太子與吳質書云孔璋章表殊健元瑜書記翩翩至今以翩翩為異呼也晉及齊陳隋並為記室參軍梁武初以庾域為郎中記室宋江夏王以丘巨源掌書記未為職名至唐初房玄齡虞世南等並為秦王記室參軍或曰管記近代皇太子判六軍府中亦置掌書記或曰奏記觀風支使唐至德初改采訪為觀風使始置判官二人支使二人推官巡官各一人別駕漢置中別駕又豫州剌史周景辟陳蕃為別駕從事袁紹以田豐為別駕晉庾亮曰別駕與剌史任別乘剌史之半故曰半剌會要武德元年置諸州別駕長史通典曰秦置漢書云公孫瓚初舉孝廉除遼東屬國長史吳志伯王創業以張昭為長史齊職官志晉武帝置諸衛長史司馬各一人又周隋以來大都督府稱長史開元中改長史為尹又諸上州各置長史一人通判州事司馬周禮司馬古官也夏官大司馬掌兵之任漢因之大將軍府皆置司馬之官漢書閻柔為烏司馬陶謙為車騎將軍張溫司馬漢官儀云景帝置郡丞一員通判州事齊職儀云魏晉稱為治中唐高宗即位有司以御名請改諸州治中為司馬開元初諸府改司馬為少尹諸州各置司馬一人如郡丞之職司錄參軍開元初改京兆河南戶屬官司錄參軍管公倉等六曹如錄事參軍之職錄事參軍晉置本為功府官諸衛及王府皆有錄事參軍非州郡之職後漢有郡主簿亦曰督郵隋以錄事參軍代郡主簿掌勾稽文簿等事六曹參軍後漢置在府曰曹在州曰司六曹者公曹倉曹戶曹兵曹法曹士曹為州府之掾屬也法曹漢為決曹亦曰賊曹參軍參軍之號其始初立名位尤重漢書靈帝時陶謙以幽州剌史參司空張溫軍事魏志太祖以荀彧為侍中持節參丞相軍事又晉干寶司徒儀掾屬有行參軍又石苞拜大司馬以孫楚為鎮軍參軍楚負才氣初至長揖謂苞曰天子命我參卿軍事其後號參軍自晉以大都督府置參軍掌出使彈責非違之事其職漸卑列於六曹之下文學炙轂子雜錄曰隋開皇中州縣皆置博士俾其教授唐朝諸縣博士縣則州補州則更曹授肅宗朝改州博士為文學位在參軍上主簿後漢始有主簿即今之錄事參軍自魏晉以後親王府御史臺卿寺太史局宮尹國子將作水衡監悉置主簿又漢時縣置丞尉及諸曹椽至隋大業終始置主簿醫博士會要貞觀初諸州縣各置醫博士一員鎮將具員故事後魏置掌鎮遏防守唐神堯祖熙仕魏為金門鎮將開元中置鎮遏使耆壽會要天寶十三載敕諸郡縣父老宜為耆老以諸縣以押司錄事老者轉升為耆壽而不掌吏事里正隋置鄉小者縣置嗇夫一人百戶為一里里置正一人也進貢禹貢禹別九州任土作貢貢士周禮大司徒之職郡國舉賢者于王庭武德初委本州縣考試取其合格者每年十月隨物入貢進士舉周禮樂正論進士之秀升諸司馬曰進士隋大業初始舉進士舉試雜文貞觀八年始令貢士試雜文試雜判開元中始取州縣案牘疑議試舉人割斷其能否乃為試之科尋又採經史義假設甲乙丙丁令舉人判斷舉人三場試前漢唯射策隋及唐初亦止試策並試雜文至神龍初帖大經天寶十三載甲科舉人問策外更試詩賦為三場武舉天后長安置已上並見通典摭言道舉玄宗置道學生徒隸崇玄館習老莊文列之道舉也選曹漢成帝置後漢光武改為吏部即今之銓曹也長名榜唐總章二年司列少常伯即今之吏部侍耶也裴行儉引銓注期限定州縣升降官資高下作長名榜以為故事即今之長定格也禮部侍郎知舉開元以前並以考功員外郎知貢舉玄宗朝以員外郎權輕李昂為舉人所訴遂移於禮部以侍郎掌之慈恩寺題名開遊而題其同年姓名於塔下後為故事曳白天寶元年冬選六十四人判入等來年正月玄宗親自重試張奭不措一辭時人謂之曳白試官天后天授二年凡舉人無賢不肖大置試官自此始也處士史記伊尹負鼎俎以干湯致於王道曰伊尹處士湯迎之五返然後往從湯遂以為相又星經少微四星在太微西南北列第一為處士書墨藪雜錄韋續字源云自三皇以前結繩為政至於太吳文字生焉庖義氏獲景龍之瑞始作龍書炎帝神龍氏因嘉禾八穗乃作穗書篆書黃帝史倉頡變古文寫鳥跡為文字作鳥跡篆少昊金天氏作鸞鳳之書取似古文字顓頊高陽氏以科斗之形作科斗書帝堯因軒轅靈龜負圖作龜書靈后氏象形篆似銘鍾鼎殷時仙人務光作倒薤葉周文王時作鳥書同時媒氏作填書即今勒字填墨周宣王史籀作大篆秦相李斯作小篆刪古文又作刻符書鳥頭雲腳用題印璽也垂露篆漢章帝時曹喜所制縣針篆亦曹喜所制用題五經篇目有若針因而名之龍爪篆晉王義之作花篆河東山胤所作隸書古隸者秦程邈于雲陽獄中變大篆所作又鍾繇作正書散隸八分書唐李陽冰云秦始皇時王次仲制八分書又蕭子良云漢靈帝時上谷王次仲與秦時同姓名亦作八分書魏鍾繇謂之章程書繇又善隸書始為楷法鶴頭書與偃波書俱詔判所用又云鍾繇最善八分有焦尾波鍾公太山銘有此體草書後漢杜伯度所授因章帝所好名之為章草魏韋誕謂之草聖飛帛書後漢蔡邕見門吏飛帛因成字焉天竺書梵王之所作門狀文宗朝之前未有朱崖李相貴盛於武宗朝位至一品百官無以取其意至是相扇留其銜候起居之狀至今尚之以貴賤通用謂之門狀但稍品隔者如公狀之體有參狀漢時未有紙書姓名於剌削竹木為之後用名紙代剌也書題籤子元和中相國李趙公權傾天下四方緘翰日滿閽者之袖而潞帥郤士美時有珍獻趙公喜而報書盈幅曲敘慇懃誤卷入振武封內以遣之而振武別紙則附於潞時知其誤飛還趙公因命書吏凡有緘題令各籤官號以送故於今以為規制並見李氏資暇也行書鍾繇作謂之行押書及藁書行隸並鍾繇變之殿上合扇玄宗朝蕭嵩為相以為天子升降俯仰眾人皆得見之非肅穆之容也乃奏請凡朔望受朝備羽扇以于殿兩階上將出所司承旨索扇扇合上坐定乃去扇受朝賀上將退又索扇如初百官執笏周之前已有笏天子以玉諸侯以象齒大夫以魚鬚文士以竹禮受命于君前用笏輿服志古者貴賤皆執笏後代以來唯八坐執笏公卿但執手板至後周武帝始令百官執笏呼萬歲自古至周未有此禮按春秋後語趙惠王得楚和氏璧秦昭王聞之遺王書願以十城易之趙遣蘭相如奉璧入秦秦王大喜左右呼萬歲又田單守即墨偽約降燕軍皆呼萬歲馮鍰之薛召諸民債者合券乃矯孟嘗君之命所債賜諸民因燒其券民皆呼萬歲秦始皇殿上上壽群臣皆呼萬歲見優孟傳蓋七國之時眾所喜慶于君皆呼萬歲以後臣下對見于君及拜恩慶賀以為常制也宮人為男子拜自後周宣帝制始令宮人殿廷為男子拜年號起自漢武帝建元元年致仕官尚書咸有一德篇伊尹既復政厥辟將告歸乃陳戒于德疏云湯之上相受邑畿內告老致政事於君欲歸私邑以自安告歸之時已七十餘故禮云大夫七十而致仕蓋始於伊尹也員外官晉武帝置員外散騎常侍又置員外散騎侍郎高宗永徽五年蔣孝璋除授尚藥奉御員外置同正員實錄云自孝璋始寓直寓寄也潘岳為虎賁中郎將晉朝未有郎將廨署故岳寄散騎之省而宿故岳曰寓直天下州印春秋斗樞曰黃帝時黃龍負圖中有璽章文曰天皇合作皇符璽說文曰璽玉印也釋名印信也至秦始皇得和璧為傳國璽故天子稱玉璽諸侯丞相金印也自三代已來無璽印之制史記蘇秦佩六國印按此人臣賜印始于秦也蔡邕獨斷云古者尊卑共用之衛宏曰秦以前民皆以金玉為印龍虎紐秦以來天子為之璽獨以玉為之臣下莫敢用也十道貞觀元年併省州縣始分置十道孔子廟會要武德二年詔於國學立周公孔子廟各一所貞觀二年詔停祭周公高祖總章三年敕天下州縣置孔子廟廟軒轅本紀黃帝升天臣寮取兒杖立廟於是曾遊處皆有祠教坊唐玄宗開元三年立教坊以倡優曼衍之戲因置使教習之黃紙寫詔書制敕貞觀十年太宗詔用麻紙寫敕文又高宗上元三年詔用黃紙鳳詔後趙石季龍置戲馬觀觀上安詔書用五色紙銜於木鳳之口而頒行之檄周穆王令祭公謀父為威讓之辭以責狄人之情此檄始也事始云楚始赦尚書曰眚災肆赦殿史記秦始皇作前殿阿房商周以前其名不載白虎通及禮記皆曰天子之堂堂十洲記崑崙山王母所居有光碧堂人間遂有斯號又風俗通云楚邑大夫伍尚為堂後以為氏樓黃帝始作五域十二樓以候神軒轅本記云公王帶上黃帝明堂圖上有樓此樓之始也臺軒轅置山海經云西王母山有軒轅臺鴟尾炙轂子曰漢柏梁殿災取鴟魚尾置殿上禳厭之今以瓦為之立戟開元禮太廟社宮殿各施二十四戟一品十六戟郡王以下十四戟至十戟蝦蟆幡帶也戟并每幅二十條以五物色充玄宗朝始有戟制度也常平倉漢書宣帝時大司農耿壽昌請二郡皆築倉義倉隋開皇中制王公以下應墾田者畝納二斗為義倉以備凶年街鼓貞觀十年馬周置而罷傳呼俗因其聲號鼕鼓驛門十二辰候開元二十五年命觀風使鄭審檢校兩京驛即今門置十二辰候鑄金為人形狀史記越相范蠡既雪勾踐會稽之恥乃乘扁舟泛五湖越王思之鑄金為其象也鑄錢制始自堯置之舊事始不言起於堯湯故再敘之刻木為人形始自黃帝臣左澈因黃帝昇天之後乃刻木為黃帝狀率諸侯而朝之出仙傳拾遺榷酒漢始文帝初榷酒酤商稅漢武帝始稅商賈舟船興利之官自此始也校印斗秤會要武德八年敕諸斗秤自京太府寺校又大曆十年敕斗秤尺度準式取大府校印然後行用市令周禮曰司市漢書曰內史屬官有長安令則天垂拱三年置市令醫帝王世紀黃帝使岐伯嘗味百草木定本草經醫方以療眾病也卜筮庖義氏時有卜筮龜曰卜易曰筮又世本曰巫咸作筮三族罪史記秦文公二十年有三族罪自秦以後至唐罪大乃夷三族也病坊開元二十三年斷京城乞兒官為置病坊給廩食焉近代改悲田院或曰養病院鼓樓北史李崇為兗州牧多刦盜崇乃村置一樓樓置一鼓以防盜賊泥人祈晴玄宗天寶十三載自八月連雨六十餘日京城市垣頹壤敕令人家門前作泥人長三尺左手指天右手指地以祈晴也雨旱閉門前漢書董仲舒推陰陽術雨多則閉北門旱則閉南門即坊市門也導引古今注漢京兆河南及執金吾司隸校尉皆使馬前導引傳呼使行者止坐者起四人持角弓箭走者則射之有乘高窺瞰者亦射之魏置角弩設而不用丁中武德七年頒新曆凡男子始生為黃四歲為小十六為中二十為丁六十為老馬歲為齒貞觀初有牝馬三千匹于隴西置群牧使開元初命太僕卿張萬歲緝其政既沒以張氏家諱眾以為馬齒一曰倍二向三也獸醫黃帝時有馬師皇者善醫馬周禮夏官巫馬掌養疾馬而乘治之三式風后演河圖為式一千八百局名曰遁甲十二辰黃帝立子丑十二辰以名月以名獸配十二辰屬之木丸塞人口唐武后戮郝象賢竈黃帝置盤盂黃帝臣孔甲造僧釋教以佛法僧為三寶漢明帝內傳曰摩滕竺法蘭自西域以白馬馱經中國帝于城外立精舍以處摩滕等號白馬寺漢地有僧及寺之始也尊勝經號僧曰苾蒭諸經名為比丘亦名苾蒭本是草名有五義一生不背日二冬夏常青三體性柔軟四香氣遠騰五引蔓傍布為佛子弟理亦宜然後漢記曰其精至者號為沙門漢言息心經疏亦言息惡沙門者梵語云迦瞞那西街僧錄廣弘明集云後魏太祖以趙郡沙門法果為沙門統綰攝僧徒至文帝以師賢為僧統又按參玄語錄云後秦姚萇之世羅什入關學徒三千餘人因立道䂮音略為僧正法欽慧斌掌僧錄給事乃與吏人同中國置僧官自此始東魏北齊尚其統宋南齊梁陳尚其正又元魏以僧顯為沙門都統語錄云隋革周命天下分置十統唐罷統立兩錄司於京邑謂之僧錄紫衣唐代宗實錄云大曆三年記杭州僧惠崇內賜紫袈裟僧門師號自鳩摩羅什稱為法師後中國名僧呼法師晉書嘗講經草堂寺朝臣及大德沙門千餘人觀聽於時有大德之目後趙石虎號佛圖澄為大士後秦姚興謂什羅曰大師又晉書什羅釋在鳩摩羅炎世為天竺相國有大節將嗣位乃辭避出家東度蔥嶺龜茲王郊迎之請為國師又姚興迎羅什待以國師之禮又續高僧傳梁國師惠約武帝敕曰師德高人唐中宗賜僧萬迴師號為法雲公廣明中僖宗幸蜀以知玄賜號悟達國師僧澈等皆大師僧加爵秩諡贈弘明集後魏太祖以沙門法果授輔國宜城子累加忠信安城公卒贈先壽將軍趙明靈公隋文以沙門彥宗為翻經館學士唐開元二十七年僧普寂卒諡曰大照禪師沙門稱釋氏高僧傳釋教出家從師命氏晉道安受業于佛圖澄澄姓帛氏以師莫過于佛遂以釋為姓中國沙門稱釋自道安始也道士太霄瑯書經曰人行大道號曰道士又仙傳拾遺又樓觀本紀曰周穆王尚神仙因尹真人艸樓在終南山之陰王追其舊跡遂召幽逸之人尹軌杜仲謂之道士居於艸樓之所因號為樓觀亦道觀始也兩街威儀仙傳拾遺隋文帝始以玄都觀主王迢為威儀至唐置左右兩街威儀道門賜紫中宗神龍二年道士葉靜能加金紫有斯命而未頒賜紫衣至代宗朝李泌初立大功李輔國將不利之乞遊衡岳許之賜紫道衣道士賜號魏世祖詔賜道士寇謙之天師之號軒轅本紀黃帝問牧馬童子為天下之道再拜稽首稱天師而退其後張道陵有天師之號唐以玄宗朝李含光詔到京懇辭歸茅山敕置紫陽觀號之以玄靜先生其後道士方有兩字之號自大師加先生之號以為常制道門爵秩諡贈後周武帝時道士魏元嵩封蜀郡公加太保唐高宗朝道士葉靜能入直翰林為國子祭酒至姪孫葉法善玄宗授銀青光祿大夫鴻臚卿衛國公又肅明觀王尹愔拜諫議大夫梁陶弘景告化諡曰貞白先生又道士王知遠歷梁陳隋至唐太宗親授法籙告化年一百二十六歲詔賜昇真先生玄宗朝葉法善告化詔贈光祿大夫越州都督三教論義嘲譚按會要論義始於武德七年高宗幸國學引道士沙門博士雜相駁難久之又嘉話錄德宗降誕日令三教講論嘲謔其後累朝以為常制靈寶清齋仙傳拾遺王法進者幼而好道天寶中三川飢歉人多采野葛山芋而食忽有二青衣童降其庭謂法進曰上帝敕我迎汝不覺騰身經大帝之所言世人厭棄五榖為天神所責宜令汝歸世間告諭下民使其悔罪命侍女以靈寶清齊告謝天地儀一軸傳于是相諭于幽山高靜之所置齊悔謝則宿罪可除穀父蠶母之神為置豐衍矣纛二儀實錄曰殷有皂緣為之似蚩尤首五百人置一纛晉侯作六軍六纛天子十二纛唐初置二十四纛每歲一祭之軍發處祭纛用人及白馬為牲所祭蚩尤主也五方牙旗黃帝出軍訣曰有作政代作五綵牙旗今五方旗是矣孫權作黃龍大牙在軍中伺風鳥古今注曰夏禹置炙轂子曰舟船於檣上刻木作鳥銜幡以候四方之風名五兩竿軍行以鵝毛為之亦曰相風鳥斧鉞輿服志曰黃帝置以銅為鳳首銜刃古今注云金斧黃鉞也鐵斧玄鉞也三代通用之武王以黃鉞斬紂太公以玄鉞斬妲己將軍出征特授黃鉞者亦以銅為之槍黃帝與蚩尤戰即有其制諸葛亮置木作槍長二丈五尺以鐵為頭見二儀實錄戟實錄曰自夏后氏有之如槍兩歧置刃謂之戟今為門戟親王加朱架之謂之棨刀及衙刀洞冥記曰黃帝鑄刀二儀實錄曰刀之制有四陣之刀起自蚩尤與黃帝戰於涿鹿即有陌刀軍陣用之又陣障刀侍從障衛則用之代張耳又有長刀即鹵薄千牛將軍執之又儀刀即武臣佩之自東晉多虞遂以木為之飾以金銀佩之以備威儀即今之衙刀也器仗實錄云有虞氏之始也韣鹿箭筒韔張弓袋也又有施弓袋謂之三仗抹額實錄曰禹塗山之夕大風雷震中有甲步卒千餘人有金甲鐵甲者其不備甲以紅絹帕抹其頭額皆佩刀以為侍衛至禹所云海神來朝禹問之對曰此抹服此武士之首服及始皇巡狩至海濱亦有神皆抹額緋衫大口袴以為侍衛自此為軍容之服傍排自夷牟始也謂之傍排步軍用八尺牛筋排馬軍用朱漆圓排見二儀實錄鐵蒺藜鐵菱角隋書煬帝征遼東置之要路水中剌人馬也攻城地道魏書袁紹公孫瓚為地道土山魏書太祖與袁紹戰紹起土山射營中太祖乃為發石車擊紹眾號霹靂車雲梯魯人公輸般造以攻宋城太白陰經為之飛梯以大木為床床下置六輪上立兩牙牙有梧梯節中長一丈二尺有四桄桄相去二尺勢微曲遞牙相括飛於雲間以窺城中其上梯首冠雙轆轤枕城而上也衝車火箭石磨井欄重牆地突魏書云蜀諸葛亮圍陳倉時將軍郝昭築陳倉城亮進攻起雲梯衝車昭以火箭逆射梯然昭又以繩連石磨壓其衝車衝車折亮更為井蘭百尺以射城中以土瓦填塹欲直攀城昭又於內築重城牆障之亮又鑿地突以攻昭又於城中穿地橫截之木驢雉尾炬梁侯景為尖頭木驢攻城矢石不能制羊侃作雉尾炬施鐵鏃以油灌之擲木驢上俄頃而盡飛樓懸梯板屋宋書武帝攻慕容昭於廣固用之水戰具太白陰經云水戰之具始自伍員制之與楚戰以船為車以楫為馬樓船漢武帝欲征昆明國作昆明池以習水戰造樓船戈船後楊僕為樓船將軍轉關橋梁端橫括拔去括橋轉關人馬不得過度皆傾水中秦用此橋殺燕丹出太白陰經軍樂凱歌岐伯置黃帝臣也軍營黃帝以兵師為營衛遂築營壘後因以兵之所居曰軍營律呂律曆志黃帝使伶倫氏取嶰谷之竹斷兩節吹黃鍾宮制十二管應十二月聽鳳凰之鳴雄為六律雌為六呂刻漏起於軒轅周禮擊壺氏掌之閏月黃帝消息正閏餘也堯典以閏月正四時成歲左傳曰歸餘於終也桃板玉燭寶典曰元日造桃板著戶謂之仙木以鬱林山桃百鬼畏之即今謂之桃符也其上或書神荼鬱壘之字爆竹荊楚歲時記曰元日庭前爆竹起於古之庭燎翦綵勝初學記云起於晉代賈充李夫人所作瑞綵圖之形又云取似王母戴勝也董勛問禮俗人日以七種菜為羹剪綵為人勝或鏤金簿為人以帖屏風亦戴之於頭髮又造花勝以相遺也鞦韆古今藝術圖云北方夷狄愛習輕趫之能每至寒食為之中國女子學之乃以綵繩懸樹立架為之鞦韆名也餳粥陸翽鄴中記寒食二日作醴酪煮羹粳米及大麥為酪擣杏仁煮作粥玉燭寶典曰今人悉以大麥粥研杏仁為酪以餳飫之蓋斷火故作此粥也拜掃按開元禮昔者宗子去在他國庶子無廟孔子許望墓為壇以時祭祀又唐禮初出城拜墓每新拜墓皆往墓見會要開元二十二年敕寒食上墓禮經無聞近代相傳浸以成俗士庶有不合廟享者何以表其孝思宜許上墓編入五禮於營南門外奠祭饌訖泣辭任於他處不得作樂競渡楚傳云起於越王勾踐又歲時記云俗謂屈原死於汨羅時人傷之並將舟楫以拯之因以為俗歲華記麗云因勾踐以成風極屈原而為俗也登高飲菊花酒續齊諧記云汝南桓景隨費長房遊學房謂景曰九月九日汝家當有災厄急令家人作絳囊盛茱萸懸臂登高飲菊花酒此禍可消景舉家登山夕還見雞犬皆暴死餌西京雜記武帝令宮人賈佩蘭九月九日食餌飲菊花酒云令人長壽玉燭寶典曰食餌者其時黍秫並收因以粘米嘉味觸類嘗新遂成積習周官籩人實糗餌粉餈王寶注曰糗餌者豆屑末而蒸之以棗豆之味同食方言云餌謂之餈也蜀蠶市仙傳拾遺云蠶叢氏自立王蜀教人蠶桑作金蠶數千頭每歲之首出金頭蠶以給民一蠶民所養之蠶必繁孳罷即歸蠶於王巡境內所止之處民則成市蜀人因其遺事每年春置蠶市也蠶絲黃帝元妃西陵氏始養蠶為絲禮記享元蠶即西陵氏也儺軒轅本記云東海有度索山山有神荼鬱壘之神能禦兇鬼因制毆儺之神袍二儀實錄云殷周以來貴賤通服論語曰衣敝褞袍至後周晉公宇文護始令袍加襴煬帝詔丞相牛弘憲章古制衣袍皆有差等三品四品通著紫綾袍五品服采六品以下用綠官吏以青庶人服白商用皂無襴謂之直綴士卒以黃武德初並因隋制天子常服黃袍及後漸用赤黃遂禁士庶不得服赤黃襴衫實錄曰三代皆依命數而服冕服後至周以枲紵為衫以為上服貴女功之始也初命以黃至五命以紫士服短褐庶人以白唐馬周上議曰臣尋究禮經無衫服之文三代以布為深衣今請於深衣之下添襴及裙名曰襴衫以為上士之服其開袴者名曰舒袴衫庶人服之詔從之今之公服蓋取襴衫之制汗衫實錄曰古者朝宴袞服之中有白紗中單百宮郊享服之中有明衣皆汗衫之狀至漢高祖與項羽戰爭之際汗透中衣單遂改名汗衫貴賤皆通服也半臂實錄曰隋大業中內官多服半襟即今之長袖也唐高祖減其袖謂之半臂幞頭實錄曰上古被髮服皮自三代即冠皆列品命黔首以皂絹三尺裹髮亦為軍戎服後周武帝裁為四腳名曰幞頭唐馬周請左右各三攝以三才重繫前腳法二儀詔從之巾子實錄曰隋大業十年左丞相牛弘上議請著巾子以桐木為之內皆漆唐武德初置平頭小樣巾子武后內宴賜百寮絲葛巾子中宗內宴賜宰相內樣巾子漢書梁冀改易制作為埤幘狹冠折上巾傅子曰漢末王公多委王服以幅巾為雅素袁紹崔鈞雖為軍皆著縑巾又郭林宗遇雨巾一角墊號曰折角巾晉陶潛葛巾漉酒後人因置漉酒巾龍袞黃帝作魚袋實錄云三代以韋為之謂之筭袋盛筭子磨石等至魏易之為龜袋唐永徽二年文武職事四品並給魚袋天后復改魚為龜神龍元年一品至四品賜紫給金魚袋五品以下賜緋銀魚袋會要云唐初卿大夫沒追收魚袋永徽五年敕五品以上薨沒隨身魚帶不用追取笏囊明皇雜錄故事皆搢笏於帶然後乘馬宰相張九齡設笏囊使持之馬前袴實錄云上古以皮為袴名曰褶至今朝祭之服及鹵簿中武士皆服緋衫大口袴褶至魏文帝止名曰袴褌西戎以皮為之夏后氏以來以絹為之長至膝漢晉名曰犢鼻北齊則袴長短相似而省犢鼻之名偏匹緜反後衣古者衣服短而齊不至於地後漢書梁冀始製狐尾單衣注云後裙曳地若狐尾至今婦人裙衫皆偏裁其後俗呼曰偏後衣也鞾實錄曰胡履也趙武靈王好胡衣常服短靿靴黃皮為之漸以長靿靴軍戎通服之故事胡虜之服不許服著入殿省至唐馬周以麻為之殺其靿加以靴氈許入殿省又唐初天子服六合靴未知其制開元初裴叔通以羊皮為之謂之隱麖履舄實錄曰三代皆以皮為之禮曰單底曰履重底曰舄朝祭之服也始皇二年以皮為之西晉永嘉元年始因黃革為之宮內妃御皆著之始有伏鳩頭鳳頭履子齊高祖宮入紫皮履梁天監中武帝以綠為之名解脫履唐天曆中進五朵履古今注舄以木置之履下乾臘不畏泥溼天子赤舄凡舄色似裳履也履乃履之不帶者也履即舄之制而末底曰齒也腰帶實錄曰腰帶之制蓋自古皆有革帶也皆反插垂頭至秦二世始名腰帶至唐高宗詔腰帶向下插垂頭上元元年敕文官并帶手巾筭袋刀子礪武官亦聽帶文武三品以上金玉帶十三銙四品金帶十一銙五品十銙六品以犀帶九銙七品銀帶八品九品鍮石並八銙庶人六銙銅鐵帶帽子實錄云漢文帝時鄧通以櫂船為黃頭郎注云棹船者著黃帽因名黃頭郎蓋染絹帛為之漢以前未聞其制晉書王濛少美容姿帶破帽入市買之群嫗悅爭遺其帽子未詳誰人所制絲麻鞋實錄云自夏殷皆以艸為之左傳謂之屝履周以麻為之晉永嘉中以絲襪實錄曰自三代以來皆有之謂之角襪前後不隻相盛中心繫口以帶史記中山王襪帶解顧左右無能令繫者又張釋之為王生結襪皆有帶也自魏文帝吳妃乃裁縫為之即今時樣也以綾羅為之故陳思王洛神賦羅襪生塵大帽實錄曰大帽野老之服至後魏朝臣皆戴之唐初以縠為之以隔風塵裙二儀實錄曰古之所貴衣與裳連下有裙隨衣色而下有緣自堯舜以降或有六破及著直縫皆去緣殷周以女人服太質稍加之花繡今裙上綴五色花以羅縠為之梁天監中武帝造五色繡裙加朱繩真珠為飾至煬帝作長裙十二破名曰仙裙上綴五色翠花唐初馬周上疏女人裙請交界裁之而去朱繩其餘仍舊蓆帽實錄曰本羌人之首服以羊毛為之謂之氈帽至秦漢中華競服之後以故蓆為骨而鞔之謂之席帽女人戴者其四網垂下網子飾以朱翠謂有障蔽之狀隋煬帝幸江都每御紫微樓觀市欲見女人姿容詔令去網子珠翠又按唐實錄曰高宗朝以國初宮人騎馬者依齊隋舊制多著羃䍦雖發自戎夷而全身障蔽不欲途路窺之王公之家亦同此永徽之後復有用幃帽施裙到胸漸為淺露至則天後幃帽大行羃䍦遂廢雨衣凡雨具周時有之左傳楚子次於乾溪雨雪王皮冠秦復陶秦所遺雨衣也又陳成子製伏戈製雨衣也炙轂子雜錄曰絹油之製及油始有之衫實錄曰古者女子衣與裳連狀如披衫而制之短長與裙相似秦始皇方令短作衫子長袖猶至於腰陳時宮中尚短袖窄小衫子纔用八尺物為衫顏色不一隋文帝用一丈物為之即今印齪纈衫子唐宮人亦以一丈為之背子實錄曰自秦二世詔衫子上朝服加背子袖短於衫以金銀絹繡為之上服宴會朝賀悉令服之其裙在背子下身與衫子齊而大袖以為禮服也披衫實錄曰披衫為制蓋從褕翟而來但取其紅紫一色而無花綵長與身齊大袖下其領即暑月之服自漢宮有之宮掖承恩者賜紫披彩後漢書百官端午各賜一對魏晉以為故事永嘉中貴賤通服之披襖子實錄曰蓋上古褘衣遺狀也尚墨色而無花綵秦漢以五色魏文帝詔令春正月婦獻上舅姑披襖子氈履禮衣釵細鬢實錄曰自殷周之代內外命婦朝賀宴會服朱翟衣戴步搖以髮為之如今鬢週迴插以鈿釵翠朵子垂條而尋常頭髻彷佛其樣向前後插小花子釵梳以為容飾自後其狀不一其步搖之制不一晉永嘉以髮為步搖之狀名鬢以為禮容至隋及唐尚用之為嘉禮之服裙襦大袖為之禮衣其上皆飾以翟即今之翟衣婦之正服至開元中婦見舅姑即戴步搖插釵翠若今通傳即戴鬢而無釵及裙襦大袖也西京雜記漢趙飛燕為后其女弟遺其姊黃金步搖織成上襦同心七寶釵又崔豹古今注曰魏宮人莫瓊樹始作蟬鬢望之縹緲如蟬翼髻梳子頭𢄼搔頭篦釵草花子實錄曰自燧人氏而婦人束髮為髻髻者繼也言女必有繼於人也但以髮相纏而無物繫縛至女蝸氏以羊毛為繩子向後繫之以荊梭及竹為笄用貫其髻髮而未有梳至赫胥氏造梳以木為之二十齒至黃帝有棟宇而去穴處皮毛之弊堯以銅為笄橫貫其髻後聖易之以絲及五色絹名曰頭𢄼舜加女人首飾釵雜以牙玳瑁為之周文王於髻上加珠翠翹花傅之鉛粉其髻名高曰鳳髻又有雲髻步步而搖故曰步搖始皇宮中悉好神仙之術及梳神仙髻皆紅妝翠眉漢宮尚之後有迎春髻垂雲髻漢武就李夫人取玉簪搔頭自此宮人多用玉時王母下降從者皆飛仙髻九環髻遂貫以鳳首飾釵孔雀搔頭雲頭篦以玳瑁為之漢明帝令宮人梳百合分髾髻音稍髮尾也同心髻魏武帝令宮人梳反綰髻插雲頭釵篦晉惠帝令宮人梳芙蓉髻插通艸五色花及陳宮中梳隨雲髻即暈妝隋文宮中梳九真髻紅妝為之桃花面插翠翹流蘇搔帖五色花子煬帝令宮人梳迎唐髻異哉陳宮梳墮雲髻隋宮復梳迎唐髻皆預應入隋歸唐之徵也插悲翠𨦃子作白妝又令梳翻荷髻作啼妝坐愁髻作紅妝至唐武德中宮內梳半翻髻又梳反綰髻樂遊髻即水晶殿名也開元中梳雙環望仙髻及回鶻髻貞元中梳髻子歸順髻帖五色花子又古今注云長安作盤桓髻驚鵠髻復作倭墮髻上音安下音墮一云梁冀妻墮馬髻之遺狀也畫眉實錄曰漢武帝令宮人掃八字眉魏武帝令宮人掃青黛眉連頭眉一畫連心細長謂之仙娥妝齊梁間多效之唐貞元中又令宮人青黛畫蛾眉古今注云梁冀妻改翠眉為愁眉魏人畫長眉西京雜記云司馬相如妻文君眉色如望遠山時人效之畫遠山眉冠子實錄曰軒轅黃帝置冠冕漢武內傳曰上元夫人戴九雲夜光之冠王母戴太真冠晨纓之冠漢宮掖承恩者賜碧芙蓉冠子并緋芙蓉冠子帔子帔帛實錄云三代無帔子之說至今加披帛以為禮節尚以縑帛為之至漢即以羅西晉永嘉中制絳暈帔子開元內令披帛士庶之家女子在室帔帛出適人則披帔子拜帛實錄曰三代無名制即香纓以五綵為之婦見後故要參舅姑即令人持香纓諮白許見則出不許即收之晉永嘉中尚用北齊後魏尋廢隋大業五年宰相牛弘建議古禮婦執香纓以為請訊未為允當自今後請以素絹八尺中擗名曰拜帛以代香纓詔從之幞頭唐初女子不戴幃帽而戴皂羅方五尺亦謂之幞頭至今婦人凶服亦戴之以布兩幅為之齊縗加絰於上五服外至輕者以碧紗為之俗謂蓋頭帛錦王子年拾遺云員嶠環丘蠶蘭長一尺五彩堯時海人織錦以獻入水不濡入火不燒後代效之染五色絲織成又丹陽記始於蜀繡舊事始云西施造非也尚書云黼黻絺繡以五采章施於五色作服正義曰舜令禹繡以五綵制作衣服乃知虞舜時有繡也周官曰五采備謂之繡實錄曰諸侯朝祭之服皆繡漢魏宮內競繡名花瑞獸飛禽晉永嘉中御服皆繡夾纈舊事始云微子造而故實二儀實錄曰秦漢間始有之陳梁間貴賤通服之隋文帝宮中者多與流俗不同次有文纈小花以為衫子煬帝詔內外官親侍者許服之唐代宗寶應二年章敬吳皇后將合祔肅宗建陵啟舊堂經三十四年面上妝粉如新唯衣服皆朱黃色又有繒綵如撮染成如花鳥之狀玄宗柳婕妤妹適趙氏性巧因使工鏤板為雜花似之而打為夾纈初獻皇后一尺上見而賞之代宗也因敕宮中依樣製造似此始有夾纈之製出潘氏燕脂崔豹古今注云燕脂出西方葉似薊花似茜土人以染粉為婦人面色一名燕脂一名紅藍後人效之以紅花染絳為臙脂粉殷周以降即塗鉛粉謂之胡粉乃紂所造者二儀實錄曰秦弄玉善吹簫感簫史降與穆公鍊飛雲第一轉與弄玉塗之名曰粉即水銀輕粉也流杯晉書束晳曰昔周公卜洛流水以汎酒故逸詩曰羽觴隨流波其後三月三日曲水流杯即其遺事卷白波資暇云起於東漢初搶白波賊戮之如席卷故酒席倣之以快人情氣也三臺送酒劉公嘉話錄曰三臺送酒蓋因北齊文宣毀銅雀臺宮人拍促呼上三臺因以送酒資暇云三臺三十拍促曲名昔鄴中有三臺石季倫遊宴之地近樂工造此曲促飲也又一說蔡邕自治書御史累遷尚書三日之間周歷三臺樂府製此曲以悅邕三說未知孰是米藝文類聚云神農之時民始食榖熊白啗貞元初穆寧為味州剌史其子給事中未達官列侍寧前見熊白及鹿脩乃曰白肥而脩瘠相滋而宜呼即以白裏脩段而進寧甚珍之厥後因以肥羜及熊白為生而食之注子偏提元和初酌酒用奠杓無何改為注子其形如罌而蓋嘴柄其背元和中貴人仇士良惡其名同鄭注乃去其柄安系著茗瓶而小異之目曰偏提茶托子建中初蜀相崔寧之女以金茶盃無儲病其熨指取碟子盛之既啜而盃傾乃以蠟環碟子使其盃遂定即遣匠以漆環代蠟進於相國相國奇之為製名托子是後傳者更環其底阮咸唐代宗朝阮行沖為太常少卿時有人於古冢獲銅器似琵琶而圓獻於阮公曰此阮仲容所造乃命工人以木為之音韻清朗頗難名權以仲容之姓名呼為阮咸阮公昔賢豈可以其名氏號樂器乎元以其形似月其聲合琴名之月琴以上並見李氏資暇帷幕歸藏曰女媧張雲幕而占神明即幕之始也說文曰在上曰幕在傍曰帷幕帳也又周禮幕人掌王之帷幕也左傳曰子我在幄註幄帳也又衛侯為虎幄於藉圃註云新造幄幕帷帳幄幕相類也屏風周禮曰設皇邸邸即後版曰屏風以鳳凰羽飾之禮記天子當扆而立屏風也拂廬帳貞觀八年吐蕃王贊普使人入貢去長安西八千餘里貴人處於大氈帳名曰拂廬高宗永徽五年吐蕃獻大番拂廬其始以拂於穹廬為號也桔槔莊子子貢教漢陰圃者為桔槔虎頭枕西京雜記云李廣見虎臥一矢斃斷其髑髏以為枕拆封刀子資暇云起於郭汾陽書吏也舊但用刀之小者所取文帖既繁刀刃鉤折吏漸出新意削木加於折刃之上汾陽喜其用心曰真郭子儀之吏後因傳之益妙其製印囊崔豹古今注云青囊所以盛印也彈弓藝文類聚云古者人民質樸死者未有棺槨殯葬之禮裹以白茅投之中野孝子不忍見父母為禽獸所食作彈弓守之後因有彈弓歌呂氏春秋曰昔葛天氏三人操牛尾促足以歌八闋事始云帝俊八子始為歌舞三皇五帝後不知是何代也舞按孟頻帝王統錄引教坊記昔陰康氏之王天下也水有襄陵之變人多重腿之疾思所以通利關節於是始製舞也呂氏春秋又曰舞自陶唐氏兩存之骰子聲譜云博陸采名也魏陳思王曹子建制雙陸局置骰子二至唐末有葉子之戲未知誰置遂加骰子至於六按鳥曹始置六博之戲乃行十二棋者又老子度函谷關置摴蒱戲俱曰博見李氏資暇按諸家自書骰子合作投子投擲之義今作骰子字非史記蔡澤說范睢曰博者欲大投裴駰註云投子也乃投擲之義是樗蒲盧雉犢白五木骰子也非謂今自么至六者蓋陳王之作也潘氏紀聞譚曰骰子飾四以朱者因玄宗與貴妃采戰將北惟重四可轉敗為勝上擲連呼咤之骰子宛轉良久而成重四上大悅命將軍高力士賜四緋也握槊按後魏李邵序洛陽丘阿雙工握槊蓋胡中之戲胡王有弟遇罪將殺之弟從獄中為此戲以上之意言孤則易死亦似曹子建所作之義或謂之雙陸即今之胡雙陸也宣武以後大盛於時又齊武成胡皇后與和士開握槊爾朱世隆與示山攜握槊忽聞歘然笑聲一局盡倒側楸碁局自古有碁即有碁局唯側楸之製出齊武陵王曄始令破楸木為片縱橫側排以為棋局之圖彈碁事始引世說始自魏白氏六帖亦誤也按西京雜記漢武帝好蹴踘言事者為勞體非至尊所宜帝曰朕好之可擇似而不勞者奏之家君作彈碁貢角抵戲史記秦二世在甘泉宮作樂角抵俳優之戲其後漢武帝好此戲即今之相撲也鹵簿炙轂子雜錄云輿駕行羽儀導從謂之鹵簿自秦漢始有其名後漢胡廣作天子出行鹵簿帝往甘泉則用之名曰甘泉鹵簿按字書鹵大楯也字亦作櫓以甲為之所以捍敵也甲楯部伍之次皆著之簿籍南朝御史中丞建康令俱有鹵簿晉書石季龍作女騎千人為之鹵簿冬至朝賀漢雜事冬至陽生君道安故賀之降誕節玄宗八月五日降誕日花萼樓宴群臣宰相乾元曜等是日率百官上表請為千秋節群臣常獻萬歲壽酒其後誕降日節號自玄宗始國忌日舉樂嫁娶會要神功元年建安王攸宜破契丹凱還內史王及善等奏以為將軍入城例有軍樂今國家忌日請備而不奏鳳閣侍郎王方慶奏晉穆帝納後用九月是康帝忌月下太常禮官都納等議稱只有忌日而無忌月若有忌月即有忌歲當時從納所議況軍樂是軍容與常樂不等臣謂請振作於事無嫌乃從之居官不諱嫌名宋書范曄泰之子為太子詹事曄固辭朝議以禮不諱嫌名乃居之唐睿宗延和元年賈曾授中書舍人以父名忠辭不受議者謂中是曹司名又與曾父名音同字別禮無嫌曾乃就職墓誌炙轂子雜錄曰齊太子穆妃將葬議立石誌王儉曰石誌不出禮經起宋元嘉中顏延之為王球作墓誌以其素族無名誄故以紀行自爾遂相祖習儲妃之重禮絕常例既有哀策不煩石誌儉所以知喪禮施石誌於壙裏禮無此制魏侍中繆習改葬父母制墓下埋文原尋此旨將以千載之後陵谷遷變欲後人有所聞知若無殊才異行但記姓名又齊時有發古冡得石云青州世子東海女郎海東豐旻以為司馬越子嫁為茍晞子婦驗之果然又東都殖業坊十字街有王戎墓隋代釀家穿傍得石云晉司徒安豐元公王君之墓然則昔之葬者魏晉以來皆有墓誌也鑑按西京雜記前漢杜子夏臨終作文曰云云及死命刊石埋於墓前厥後墓誌恐因此始矣挽歌左傳魯哀公會吳伐齊戰公孫夏命其徒歌虞殯送葬歌曲哀死也是知送葬之歌自古有之莊子曰紼謳司馬彪註曰紼引柩之索也引紼而謳者即挽歌也所以促人齊力也事始以起自田橫非也自周時有之也按漢書齊王田橫自刎門人不敢哭故為薤露蒿里之歌漢武帝時李延年分為二章薤露送王公貴人蒿裏送士大夫庶人使挽柩者歌之故亦謂挽歌石麟人馬羊虎西京雜記漢五柞宮梧桐樹下有石麒麟二刊其脇具為文字是秦始皇驪山墓前物也炙轂子實錄云秦漢以來帝王陵皆有石麒麟辟邪羊馬之屬人臣墓前有石人馬羊虎柱之類方相軒轅本紀黃帝周遊時元妃嫘祖死於道令次妃嫫姆護監因置方相氏以護喪亦曰防喪
